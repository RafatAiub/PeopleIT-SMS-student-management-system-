version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sms_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms_user} -d ${POSTGRES_DB:-sms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-sms_redis_pass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-sms_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management (remove in production)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@peopleit.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: sms_network
